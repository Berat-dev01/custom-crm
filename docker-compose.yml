services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./:/var/www/html
    networks:
      - crm
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      PHP_OPCACHE_ENABLE: ${PHP_OPCACHE_ENABLE:-1}
      COMPOSER_AUTH: ${COMPOSER_AUTH:-}

  nginx:
    image: nginx:alpine
    ports:
      - "${APP_PORT:-8081}:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - crm
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    ports:
      - "${DB_FORWARD_PORT:-3307}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-crm}
      MYSQL_USER: ${DB_USERNAME:-crm}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - crm
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:alpine
    ports:
      - "${REDIS_FORWARD_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    networks:
      - crm

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: sh -c "if [ ! -f artisan ]; then echo 'Laravel artisan not found yet; queue is waiting.'; tail -f /dev/null; fi; php artisan queue:work redis --sleep=3 --tries=3 --timeout=90 --max-time=3600"
    volumes:
      - ./:/var/www/html
    networks:
      - crm
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: sh -c "if [ ! -f artisan ]; then echo 'Laravel artisan not found yet; scheduler is waiting.'; tail -f /dev/null; fi; while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - ./:/var/www/html
    networks:
      - crm
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "${MAILPIT_FORWARD_PORT:-8026}:8025"
    networks:
      - crm

networks:
  crm:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
